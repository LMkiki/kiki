<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>移车智能助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    background: #000;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    text-align: center;
    padding: 14px 0 12px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .msg { max-width: 82%; padding: 12px 16px; font-size: 15px; line-height: 1.5; word-break: break-word; }
  .msg-system {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px 18px 18px 4px;
    color: #f5f5f7;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .msg-user {
    align-self: flex-end;
    background: linear-gradient(135deg, #007AFF, #0055D4);
    border-radius: 18px 18px 4px 18px;
    color: #fff;
  }
  #input-bar {
    position: sticky;
    bottom: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: rgba(28,28,30,0.78);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  #input-bar input {
    flex: 1;
    height: 40px;
    padding: 0 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-bar input:focus { border-color: #007AFF; }
  #input-bar input::placeholder { color: rgba(255,255,255,0.35); }
  #input-bar input:disabled { opacity: 0.35; }
  #input-bar button {
    flex-shrink: 0;
    height: 40px;
    padding: 0 18px;
    border: none;
    border-radius: 20px;
    background: #007AFF;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: inherit;
  }
  #input-bar button:active { opacity: 0.7; }
  #input-bar button:disabled { opacity: 0.35; cursor: not-allowed; }
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); animation: dotPulse 1.2s infinite ease-in-out; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
  @media (max-width: 480px) {
    #messages { padding: 14px 12px 16px; }
    .msg { max-width: 88%; font-size: 15px; padding: 11px 14px; }
    #input-bar { padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div id="app">
  <header>移车智能助手</header>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="请输入..." autofocus disabled>
    <button id="send" disabled>发送</button>
  </div>
</div>
<script>
  const API_BASE = 'http://127.0.0.1:8000';
  let sessionId = null;
  let finished = false;

  const $msg = document.getElementById('messages');
  const $input = document.getElementById('input');
  const $send = document.getElementById('send');

  function addMessage(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + (type === 'user' ? 'msg-user' : 'msg-system');
    el.textContent = text;
    $msg.appendChild(el);
    requestAnimationFrame(() => { $msg.scrollTop = $msg.scrollHeight; });
  }

  function showLoading() {
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-system';
    wrap.id = 'loading-indicator';
    wrap.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
    $msg.appendChild(wrap);
    requestAnimationFrame(() => { $msg.scrollTop = $msg.scrollHeight; });
  }

  function hideLoading() {
    const el = document.getElementById('loading-indicator');
    if (el) el.remove();
  }

  function setInputEnabled(enabled) {
    $input.disabled = !enabled;
    $send.disabled = !enabled;
    if (enabled) $input.focus();
  }

  async function createSession() {
    try {
      const res = await fetch(API_BASE + '/api/chat/session', { method: 'POST' });
      const json = await res.json();
      if (json.code !== 0) throw new Error(json.message);
      sessionId = json.data.session_id;
      addMessage(json.data.reply, 'system');
      setInputEnabled(true);
    } catch (e) {
      addMessage('网络异常，请稍后重试。', 'system');
    }
  }

  async function sendMessage(text) {
    if (!text.trim() || finished || !sessionId) return;
    setInputEnabled(false);
    addMessage(text.trim(), 'user');
    $input.value = '';
    showLoading();
    try {
      const res = await fetch(API_BASE + '/api/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, content: text.trim() })
      });
      const json = await res.json();
      if (json.code !== 0) throw new Error(json.message);
      hideLoading();
      addMessage(json.data.reply, 'system');
      if (json.data.is_finished) {
        finished = true;
        setInputEnabled(false);
      } else {
        setInputEnabled(true);
      }
    } catch (e) {
      hideLoading();
      addMessage('网络异常，请稍后重试。', 'system');
      setInputEnabled(true);
    }
  }

  $input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage(this.value);
  });
  $send.addEventListener('click', function() { sendMessage($input.value); });

  createSession();
</script>
</body>
</html>
